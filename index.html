<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="InfraModeler Editor-Fundament" />
    <title>InfraModeler</title>
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div>
          <h1>InfraModeler</h1>
          <p>Deployment &amp; Infrastruktur</p>
        </div>
        <div class="app-actions">
          <button type="button" data-app-action="new">Neu</button>
          <button type="button" data-app-action="open">Öffnen</button>
          <button type="button" data-app-action="save">Speichern</button>
          <button id="undo" type="button" data-app-action="undo">Rückgängig</button>
          <button id="redo" type="button" data-app-action="redo">Wiederholen</button>
          <button id="fit-viewport" type="button" data-app-action="fitViewport">Diagramm einpassen</button>
          <button id="reset-demo" type="button" data-app-action="example">Beispiel</button>
        </div>
      </header>
      <nav id="recent-files" class="recent-files" aria-label="Zuletzt geöffnet" hidden></nav>
      <main id="canvas" aria-label="Diagramm-Editor"></main>
      <footer class="app-footer">
        <span><b>Palette</b> Element aufziehen</span>
        <span><b>Ziehen</b> verschieben und andocken</span>
        <span><b>Mausrad</b> zoomen</span>
        <span><b>Leere Fläche</b> verschieben</span>
        <span><b>Strg/Cmd+Z</b> rückgängig</span>
      </footer>
    </div>
    <dialog id="unsaved-dialog" class="app-dialog">
      <h2>Ungespeicherte Änderungen</h2>
      <p>Sollen die Änderungen vor dem Fortfahren gespeichert werden?</p>
      <div class="dialog-actions">
        <button type="button" data-choice="cancel">Abbrechen</button>
        <button type="button" data-choice="discard">Verwerfen</button>
        <button type="button" data-choice="save" class="primary">Speichern</button>
      </div>
    </dialog>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
